app-id: io.github.PirateMaryRead.canva-linux
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
build-options:
  append-path: /usr/lib/sdk/node22/bin
  env:
    XDG_CACHE_HOME: /run/build/canva-linux/.cache
    npm_config_nodedir: /usr/lib/sdk/node22
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.secrets
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - generated-sources.json

  - name: canva-linux
    buildsystem: simple
    build-commands:
      # Build inside sandbox from pinned archive.
      # dist/linux-unpacked is generated here (never reused from host checkout).
      - rm -rf dist .npm-cache .npm-offline-cache
      - mkdir -p .npm-cache .npm-offline-cache
      - cp -a /app/flatpak-node/cache/. .npm-offline-cache/
      - for pkg in .npm-offline-cache/*.tgz; do [ -f "$pkg" ] || continue; npm cache add --cache .npm-cache "$pkg"; done
      - npm install --offline --cache .npm-cache --no-audit
      - rm -rf /app/flatpak-node/cache .npm-cache .npm-offline-cache
      - npm run dist -- --linux --dir
      - mkdir -p /app/main
      - cp -a dist/linux-unpacked/* /app/main/
      - if command -v patch-electron-desktop-filename >/dev/null 2>&1; then patch-electron-desktop-filename /app/main/resources/app.asar; else patch-desktop-filename /app/main/resources/app.asar; fi
      - install -Dm755 run.sh /app/bin/run.sh
      - install -Dm644 data/io.github.PirateMaryRead.canva-linux.desktop /app/share/applications/io.github.PirateMaryRead.canva-linux.desktop
      - install -Dm644 data/io.github.PirateMaryRead.canva-linux.metainfo.xml /app/share/metainfo/io.github.PirateMaryRead.canva-linux.metainfo.xml
      - |
        for size in 16 22 24 32 48 64 128 256 512; do
          install -Dm644 data/icons/hicolor/${size}x${size}/apps/io.github.PirateMaryRead.canva-linux.png /app/share/icons/hicolor/${size}x${size}/apps/io.github.PirateMaryRead.canva-linux.png;
        done
    sources:
      - type: archive
        url: https://github.com/PirateMaryRead/canva-linux/archive/2000e1ae3ae35e62806861be2e52fb2a428d11bb.tar.gz
        sha256: 53fa429d696f5a957fadd7cc66aaf8109040f07334b8ca494f31498d56691f8e
