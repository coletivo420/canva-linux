<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Linux | Community Desktop Wrapper</title>
    <meta name="description" content="A community-maintained, open-source desktop wrapper for Canva on Linux.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/inter-ui/inter.css">
    <style>
        :root {
            --bg-color: #0e1318;
            --card-bg: #1a202c;
            --accent: #00c4cc; /* Canva-like Teal */
            --accent-hover: #00a9b0;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 3rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(0, 196, 204, 0.1) 0%, rgba(14, 19, 24, 0) 100%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header-links {
            margin-top: 1.5rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .header-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .header-links a:hover {
            text-decoration: underline;
        }

        #content {
            padding: 2rem 0;
        }

        /* Markdown Styling */
        #content h1 { display: none; } /* Hide the redundant title from README */
        #content h2 { color: var(--accent); margin-top: 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        #content h3 { margin-top: 1.5rem; color: var(--text-primary); }
        #content p { color: var(--text-secondary); }
        #content blockquote {
            border-left: 4px solid var(--accent);
            margin: 1.5rem 0;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 196, 204, 0.05);
            border-radius: 0 8px 8px 0;
        }
        #content blockquote p { font-style: italic; color: var(--text-primary); }
        #content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: var(--accent);
            font-size: 0.9em;
        }
        #content pre {
            background: #000;
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #content pre code { background: none; padding: 0; color: #e2e8f0; }
        #content ul { padding-left: 1.5rem; color: var(--text-secondary); }
        #content li { margin-bottom: 0.5rem; }
        #content a { color: var(--accent); text-decoration: none; }
        #content a:hover { text-decoration: underline; }
        #content hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 3rem 0; }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }
        #content th, #content td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #content th { background: rgba(255,255,255,0.05); color: var(--accent); }

        footer {
            margin-top: auto;
            padding: 3rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 5rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Canva Linux</h1>
            <div class="header-links">
                <a href="https://github.com/coletivo420/canva-linux">GitHub Repository</a>
                <a href="https://github.com/coletivo420/canva-linux/releases">Download Releases</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="content">
            <div class="loading">Loading project information...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Coletivo 420. Released under GPL-3.0-or-later.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadContent() {
            const contentDiv = document.getElementById('content');
            try {
                // Fetch README.md from the same directory (or parent via relative path)
                // In GitHub Pages /docs/index.html, README.md is in /README.md
                const response = await fetch('../README.md');
                if (!response.ok) throw new Error('Failed to load README.md');
                const markdown = await response.text();

                // Set options for marked
                marked.setOptions({
                    gfm: true,
                    breaks: true
                });

                contentDiv.innerHTML = marked.parse(markdown);
            } catch (err) {
                contentDiv.innerHTML = `<div class="loading" style="color: #ff4d4d;">Error loading content: ${err.message}</div>`;
            }
        }
        loadContent();
    </script>
</body>
</html>
