<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canva Linux — GitHub Pages Test</title>
    <meta name="description" content="GitHub Pages test page for the Canva Linux repository.">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e5e7eb;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 760px;
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }
      p {
        margin: 0.75rem 0;
        font-size: 1.05rem;
        line-height: 1.65;
        color: #cbd5e1;
      }
      code {
        padding: 0.15rem 0.35rem;
        border-radius: 0.4rem;
        background: rgba(148, 163, 184, 0.16);
        color: #93c5fd;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
        padding: 0.4rem 0.7rem;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.12);
        color: #86efac;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">GitHub Pages test</div>
      <h1>Canva Linux</h1>
      <p>
        This page confirms that the <code>/docs</code> directory is ready to be used as the GitHub Pages source for <code>coletivo420/canva-linux</code>.
      </p>
      <p>
        Configure GitHub Pages with <code>Deploy from a branch</code>, branch <code>main</code>, folder <code>/docs</code>.
      </p>
    </main>
  </body>
</html>
