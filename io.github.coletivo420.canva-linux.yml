app-id: io.github.coletivo420.canva-linux
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
separate-locales: false

finish-args:
  ## Core web runtime and rendering permissions
  - --share=network            # Required for Canva web/API access.
  - --share=ipc                # Common Electron/Chromium sandbox requirement.
  - --device=dri               # GPU acceleration via DRI when available.

  ## Display server support
  - --socket=wayland           # Preferred display path on modern Linux desktops.
  - --socket=fallback-x11      # Flathub-friendly fallback for X11/XWayland sessions.

  ## Audio and media pipeline
  - --socket=pulseaudio        # Audio output for editor playback/recording UX.
  - --filesystem=xdg-run/pipewire-0 # Screen/media pipeline compatibility where used.

  ## File import and desktop integration
  - --filesystem=xdg-download  # Narrow path used for common local download/export workflows.
  - --talk-name=org.freedesktop.FileManager1

  ## Portals and desktop services
  # The app relies on Flatpak portals for file access when possible; explicit
  # portal bus access is intentionally omitted because Flatpak grants portal
  # mediation without a finish-arg.
  - --talk-name=org.freedesktop.secrets

  ## Runtime environment tweaks
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: canva-linux
    buildsystem: simple
    build-commands:
      - mkdir -p /app/main
      - cp -a dist/linux-unpacked/* /app/main/
      - if command -v patch-electron-desktop-filename >/dev/null 2>&1; then patch-electron-desktop-filename /app/main/resources/app.asar; else patch-desktop-filename /app/main/resources/app.asar; fi
      - install -Dm755 run.sh /app/bin/run.sh
      - install -Dm644 package.json /app/share/canva-linux/version
      - install -Dm644 data/io.github.coletivo420.canva-linux.desktop /app/share/applications/io.github.coletivo420.canva-linux.desktop
      - install -Dm644 data/io.github.coletivo420.canva-linux.metainfo.xml /app/share/metainfo/io.github.coletivo420.canva-linux.metainfo.xml
      - |
        for size in 16 22 24 32 48 64 128 256 512; do           install -Dm644 data/icons/hicolor/${size}x${size}/apps/io.github.coletivo420.canva-linux.png /app/share/icons/hicolor/${size}x${size}/apps/io.github.coletivo420.canva-linux.png;         done
    sources:
      - type: dir
        path: .
