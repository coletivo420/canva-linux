name: Node.js Package (Debian sid)

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js and build dependencies from Debian sid
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            git \
            nodejs \
            npm \
            python3 \
            make \
            g++

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    defaults:
      run:
        shell: bash

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js and npm from Debian sid
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            git \
            nodejs \
            npm \
            python3 \
            make \
            g++

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
