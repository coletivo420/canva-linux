name: Publish package to GitHub Packages (Debian sid)

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    defaults:
      run:
        shell: bash

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and build dependencies from Debian sid
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bash \
            ca-certificates \
            git \
            nodejs \
            npm \
            python3 \
            make \
            g++

      - name: Show toolchain versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build package
        run: npm run dist

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    defaults:
      run:
        shell: bash

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and npm from Debian sid
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bash \
            ca-certificates \
            git \
            nodejs \
            npm \
            python3 \
            make \
            g++

      - name: Configure npm for GitHub Packages
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@piratemaryread'

      - name: Show toolchain versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
