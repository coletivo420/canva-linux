name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            flatpak \
            flatpak-builder

      - name: Install npm dependencies
        run: npm ci

      - name: Validate release identity
        run: |
          public_version="$(node -p "require('./scripts/project-ui.json').displayVersion")"
          package_version="$(node -p "require('./package.json').version")"
          phase="$(node -p "require('./scripts/project-ui.json').phase")"
          mapped_phase="$(node - <<'NODE'
          const version = require('./package.json').version;
          const dev = version.match(/^(\d+\.\d+\.\d+)-dev\.(\d+)\.(\d+)$/);
          if (dev) {
            console.log(`${dev[1]}.${dev[2]}-dev.${dev[3]}`);
            process.exit(0);
          }
          const release = version.match(/^(\d+\.\d+\.\d+)-(\d+)$/);
          if (release) {
            console.log(`${release[1]}.${release[2]}`);
            process.exit(0);
          }
          if (/^\d+\.\d+\.\d+$/.test(version)) {
            console.log(version);
            process.exit(0);
          }
          process.exit(1);
          NODE
          )"

          test "$phase" = "$public_version"
          test "$mapped_phase" = "$public_version"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            test "${GITHUB_REF_NAME}" = "v${public_version}"
          fi

          echo "RELEASE_VERSION=${public_version}" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"

      - name: Verify removed interface routing references
        run: |
          if grep -REn -- '--tui|--no-tui|CANVA_NO_TUI|CANVA_TUI([^_A-Z]|$)|Shell Tool|F4 Shell Tool|shell fallback' README.md docs; then
            echo "::error::Active docs still reference removed interface routing or shell fallback terms"
            exit 1
          fi

      - name: Run validation
        run: npm run validate:project

      - name: Build AppImage
        run: ./scripts/build-appimage.sh

      - name: Build Flatpak bundle
        run: ./scripts/build-flatpak-bundle.sh

      - name: Create release artifacts
        run: |
          mkdir -p dist

          appimage_source="$(find dist -maxdepth 1 -type f -name 'canva-linux-*.AppImage' | sort | head -n 1)"
          flatpak_source="$(find dist -maxdepth 1 -type f -name 'canva-linux-*.flatpak' | sort | head -n 1)"
          linux_unpacked="dist/linux-unpacked"

          test -n "$appimage_source"
          test -n "$flatpak_source"
          test -d "$linux_unpacked"

          appimage_target="dist/canva-linux-${RELEASE_VERSION}-x64.AppImage"
          flatpak_target="dist/canva-linux-${RELEASE_VERSION}.flatpak"
          tarball_target="dist/canva-linux-${RELEASE_VERSION}-linux-unpacked-x64.tar.gz"

          mv "$appimage_source" "$appimage_target"
          mv "$flatpak_source" "$flatpak_target"
          tar -C dist -czf "$tarball_target" linux-unpacked

          cd dist
          sha256sum \
            "canva-linux-${RELEASE_VERSION}-x64.AppImage" \
            "canva-linux-${RELEASE_VERSION}.flatpak" \
            "canva-linux-${RELEASE_VERSION}-linux-unpacked-x64.tar.gz" \
            > SHA256SUMS

      - name: Verify expected artifacts
        run: |
          test -s "dist/canva-linux-${RELEASE_VERSION}-x64.AppImage"
          test -s "dist/canva-linux-${RELEASE_VERSION}.flatpak"
          test -s "dist/canva-linux-${RELEASE_VERSION}-linux-unpacked-x64.tar.gz"
          test -s "dist/SHA256SUMS"
          grep -q "canva-linux-${RELEASE_VERSION}-x64.AppImage" dist/SHA256SUMS
          grep -q "canva-linux-${RELEASE_VERSION}.flatpak" dist/SHA256SUMS
          grep -q "canva-linux-${RELEASE_VERSION}-linux-unpacked-x64.tar.gz" dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: Canva Linux ${{ env.RELEASE_VERSION }} Alpha
          body_path: docs/RELEASE.md
          fail_on_unmatched_files: true
          files: |
            dist/canva-linux-${{ env.RELEASE_VERSION }}-x64.AppImage
            dist/canva-linux-${{ env.RELEASE_VERSION }}.flatpak
            dist/canva-linux-${{ env.RELEASE_VERSION }}-linux-unpacked-x64.tar.gz
            dist/SHA256SUMS
