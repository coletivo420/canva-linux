name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            flatpak \
            flatpak-builder

      - name: Install npm dependencies
        run: npm ci

      - name: Validate release identity
        run: |
          public_version="$(node -p "require('./scripts/project-ui.json').displayVersion")"
          package_version="$(node -p "require('./package.json').version")"
          phase="$(node -p "require('./scripts/project-ui.json').phase")"

          if [[ ! "$package_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::package.json version does not map to project identity: ${package_version}"
            exit 1
          fi

          test "$package_version" = "$public_version"
          test "$phase" = "$public_version"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            test "${GITHUB_REF_NAME}" = "v${public_version}"
          fi

          echo "RELEASE_VERSION=${public_version}" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"

      - name: Verify removed interface routing references
        run: |
          if grep -REn -- '--tui|--no-tui|CANVA_NO_TUI|CANVA_TUI([^_A-Z]|$)|Shell Tool|F4 Shell Tool|shell fallback' README.md docs; then
            echo "::error::Active docs still reference removed interface routing or shell fallback terms"
            exit 1
          fi

      - name: Run validation
        run: npm run validate:project

      - name: Clean release artifacts
        run: |
          mkdir -p dist
          rm -f dist/*.AppImage
          rm -f dist/*.AppImage.sha256
          rm -f dist/*.flatpak
          rm -f dist/*linux-unpacked*.tar.gz
          rm -f dist/SHA256SUMS

      - name: Build AppImage
        run: ./scripts/build-appimage.sh

      - name: Build Flatpak bundle
        run: ./scripts/build-flatpak-bundle.sh

      - name: Create release artifacts
        run: |
          mkdir -p dist

          appimage_source="dist/canva-linux-${PACKAGE_VERSION}-x86_64.AppImage"
          flatpak_source="dist/canva-linux-${PACKAGE_VERSION}.flatpak"
          linux_unpacked="dist/linux-unpacked"

          test -s "$appimage_source"
          test -s "$flatpak_source"
          test -d "$linux_unpacked"

          appimage_target="dist/canva-linux-${RELEASE_VERSION}-x86_64.AppImage"
          flatpak_target="dist/canva-linux-${RELEASE_VERSION}.flatpak"
          tarball_target="dist/canva-linux-${RELEASE_VERSION}-linux-unpacked-x86_64.tar.gz"

          if [[ "$appimage_source" != "$appimage_target" ]]; then
            mv "$appimage_source" "$appimage_target"
          fi
          if [[ "$flatpak_source" != "$flatpak_target" ]]; then
            mv "$flatpak_source" "$flatpak_target"
          fi
          tar -C dist -czf "$tarball_target" linux-unpacked

          cd dist
          sha256sum \
            "canva-linux-${RELEASE_VERSION}-x86_64.AppImage" \
            "canva-linux-${RELEASE_VERSION}.flatpak" \
            "canva-linux-${RELEASE_VERSION}-linux-unpacked-x86_64.tar.gz" \
            > SHA256SUMS

      - name: Verify expected artifacts
        run: |
          test -s "dist/canva-linux-${RELEASE_VERSION}-x86_64.AppImage"
          test -s "dist/canva-linux-${RELEASE_VERSION}.flatpak"
          test -s "dist/canva-linux-${RELEASE_VERSION}-linux-unpacked-x86_64.tar.gz"
          test -s "dist/SHA256SUMS"
          grep -q "canva-linux-${RELEASE_VERSION}-x86_64.AppImage" dist/SHA256SUMS
          grep -q "canva-linux-${RELEASE_VERSION}.flatpak" dist/SHA256SUMS
          grep -q "canva-linux-${RELEASE_VERSION}-linux-unpacked-x86_64.tar.gz" dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: Canva Linux ${{ env.RELEASE_VERSION }} Alpha
          body_path: docs/RELEASE.md
          fail_on_unmatched_files: true
          files: |
            dist/canva-linux-${{ env.RELEASE_VERSION }}-x86_64.AppImage
            dist/canva-linux-${{ env.RELEASE_VERSION }}.flatpak
            dist/canva-linux-${{ env.RELEASE_VERSION }}-linux-unpacked-x86_64.tar.gz
            dist/SHA256SUMS
