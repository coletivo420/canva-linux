name: Debian sid Node CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and build dependencies from Debian sid
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bash \
            ca-certificates \
            git \
            nodejs \
            npm \
            python3 \
            make \
            g++

      - name: Show toolchain versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Electron distribution
        run: npm run dist
